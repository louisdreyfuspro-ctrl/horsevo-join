<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rejoindre l'écurie — HorsEvo</title>
  <meta name="description" content="Rejoignez votre écurie sur HorsEvo" />
  <meta property="og:title" content="Rejoindre l'écurie — HorsEvo" />
  <meta property="og:description" content="Vous avez été invité(e) à rejoindre une écurie sur HorsEvo." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f5f5f5;
      padding: 24px;
    }
    .card {
      max-width: 400px;
      width: 100%;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      overflow: hidden;
      text-align: center;
    }
    .accent-bar { height: 3px; background: #166534; }
    .card-body { padding: 44px 32px 48px; }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: #1e3a1e;
      border-radius: 50%;
      font-size: 32px;
      margin-bottom: 20px;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .subtitle { font-size: 15px; color: #a3a3a3; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 16px 24px;
      background: #166534;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    .btn:active { opacity: 0.8; }
    .btn:disabled { opacity: 0.5; cursor: wait; }
    .hint {
      margin-top: 20px;
      font-size: 12px;
      color: #525252;
      line-height: 1.6;
    }
    .hint a { color: #4ade80; text-decoration: none; }
    .status { margin-top: 16px; font-size: 14px; color: #4ade80; display: none; }
    .error { color: #ef4444; }
    .brand {
      margin-top: 32px;
      font-size: 11px;
      color: #3d3d3d;
      letter-spacing: 3px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="accent-bar"></div>
  <div class="card-body">
    <div class="logo">🐴</div>
    <h1>Rejoindre l'écurie sur HorsEvo</h1>
    <p class="subtitle">
      Vous avez été invité(e) à rejoindre une écurie.<br>
      Appuyez sur le bouton pour ouvrir l'application.
    </p>

    <button class="btn" id="joinBtn" onclick="openApp()">
      Rejoindre l'écurie
    </button>

    <p class="status" id="status"></p>

    <p class="hint">
      Pas encore l'app ?
      <a href="https://testflight.apple.com/join/VOTRE_LIEN" id="tfLink">Télécharger via TestFlight</a>
    </p>

    <p class="brand">HorsEvo</p>
  </div>
</div>

<script>
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  var TESTFLIGHT_URL = 'https://testflight.apple.com/join/VOTRE_LIEN'; // TODO: Replace with real TestFlight link
  var DEEP_LINK = 'horsevo://join?token=' + encodeURIComponent(token || '');

  document.getElementById('tfLink').href = TESTFLIGHT_URL;

  if (!token) {
    document.getElementById('joinBtn').disabled = true;
    var s = document.getElementById('status');
    s.style.display = 'block';
    s.className = 'status error';
    s.textContent = 'Lien invalide — aucun token trouvé.';
  }

  function openApp() {
    if (!token) return;
    var btn = document.getElementById('joinBtn');
    var status = document.getElementById('status');

    btn.disabled = true;
    btn.textContent = 'Ouverture…';
    status.style.display = 'block';
    status.className = 'status';
    status.textContent = 'Tentative d\'ouverture de l\'app…';

    // Try deep link
    window.location.href = DEEP_LINK;

    // If app didn't open after 1.5s, redirect to TestFlight
    setTimeout(function() {
      status.textContent = 'Redirection vers TestFlight…';
      window.location.href = TESTFLIGHT_URL;
    }, 1500);
  }
</script>

</body>
</html>
